<!--Form Controls project BRIEF
What is the customer's name? I must collect this data, and validate it. But what is a valid name? I must decide something. 
What is the customer's email? I must make sure the email is valid. Email addresses have a consistent pattern.
What colour should this t-shirt be? I must give 3 options. How will I make sure they don't pick other colours?
What size does the customer want? I must give the following 6 options: XS, S, M, L, XL, XXL 
I must make sure they pick one of these options.
I must make sure the customer has filled in all the fields before they can submit the form.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>My form exercise</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <header>
      <h1>Product Pick</h1>
    </header>
    <main>
    <form>
    <fieldset>
    <br><br>
        <legend>Customer details</legend>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname" pattern="[A-Za-z]{2,}" title="Please enter at least 2 characters" required>
        <br><br>
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname"pattern="[A-Za-z]{2,}" title="Please enter at least 2 characters" required>
        <br><br>
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" pattern="^[^@]+@[^@]+\.[^@]+$" required> <!-- ^=start of string, [^@]=one or more characters excluding @, +@=must include @ symbol, /. =dot separating email server and top-level domain, $=end of string-->
    <br><br>
    </fieldset>
 
    <fieldset>
    <br><br>
    <legend>T-shirt Details</legend>
    Colour:<br>
        <input type="radio" id="black" name="colour" required>
        <label for="black">Black</label><br>
        <br><br>
        <input type="radio" id="Khaki" name="colour" required>
        <label for="Khaki">Khaki</label><br>
        <br><br>
        <input type="radio" id="yellow" name="colour" required>
        <label for="yellow">Yellow</label><br>
        <br><br>

    Size:<br>
      <select name="size" id="size" required>
        <option value="">Select</option>
        <option value="XS">XS</option>
        <option value="S">S</option>
        <option value="M">M</option>
        <option value="L">L</option>
        <option value="XL">XL</option>
        <option value="XXL">XXL</option>
      </select>
      <br><br>
    </fieldset>

      <input type="submit" value="Submit">
    </form>
  </body>
    <footer>
      <h2>By Mo Muchunu</h2>
    </footer>
  </body>
</html>
